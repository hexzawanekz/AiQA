<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AiQA Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #21262d;
            --bg-hover: #30363d;
            --border: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
            --accent: #58a6ff;
            --accent-hover: #79b8ff;
            --success: #3fb950;
            --success-soft: rgba(63, 185, 80, 0.15);
            --danger: #f85149;
            --danger-soft: rgba(248, 81, 73, 0.15);
            --warning: #d29922;
            --warning-soft: rgba(210, 153, 34, 0.15);
            --radius: 8px;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.5;
        }

        .layout {
            display: grid;
            grid-template-columns: 240px 1fr;
            min-height: 100vh;
        }
        .layout.collapsed { grid-template-columns: 72px 1fr; }

        /* Sidebar */
        .sidebar {
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: width 0.2s ease;
        }
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .sidebar-header .logo {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent), #a371f7);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
        }
        .sidebar-header .title {
            font-weight: 600;
            font-size: 16px;
            white-space: nowrap;
            overflow: hidden;
        }
        .sidebar-collapsed .sidebar-header .title { display: none; }
        .sidebar-toggle {
            margin-left: auto;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 6px;
            border-radius: var(--radius);
        }
        .sidebar-toggle:hover { color: var(--text-primary); background: var(--bg-hover); }
        .sidebar-collapsed .sidebar-toggle { margin-left: 0; }

        .sidebar-nav {
            padding: 16px 12px;
            flex: 1;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: var(--radius);
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
            transition: background 0.15s, color 0.15s;
        }
        .nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
        .nav-item.active { background: rgba(88, 166, 255, 0.12); color: var(--accent); }
        .nav-item svg { flex-shrink: 0; width: 20px; height: 20px; opacity: 0.8; }
        .sidebar-collapsed .nav-item span { display: none; }
        .sidebar-collapsed .nav-item { justify-content: center; padding: 10px; }

        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-muted);
        }
        .sidebar-collapsed .sidebar-footer { display: none; }

        /* Main content */
        .main {
            overflow-y: auto;
            padding: 24px;
        }
        .page-header {
            margin-bottom: 24px;
        }
        .page-header h1 {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .page-header p {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Summary cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }
        @media (max-width: 1200px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .stats-grid { grid-template-columns: 1fr; } }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
            transition: border-color 0.2s;
        }
        .stat-card:hover { border-color: var(--text-muted); }
        .stat-card.total { border-left: 4px solid var(--accent); }
        .stat-card.passed { border-left: 4px solid var(--success); }
        .stat-card.error { border-left: 4px solid var(--danger); }
        .stat-card.pending { border-left: 4px solid var(--warning); }
        .stat-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
        }

        /* Content grid */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 24px;
        }
        @media (max-width: 1000px) { .content-grid { grid-template-columns: 1fr; } }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .card-body { padding: 20px; }

        /* Run controls */
        .run-controls .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
            margin-bottom: 16px;
        }
        .run-controls label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-secondary);
        }
        .run-controls select,
        .run-controls input[type="text"],
        .run-controls input[type="number"] {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            padding: 8px 12px;
            font-size: 14px;
            font-family: inherit;
        }
        .run-controls select:focus,
        .run-controls input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .run-controls input[type="number"] { width: 64px; }
        .btn {
            padding: 10px 18px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            border: none;
            transition: opacity 0.2s, background 0.2s;
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
        }
        .btn-primary:hover { opacity: 0.9; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-secondary {
            background: var(--bg-hover);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover { background: var(--border); }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .file-input-hidden { display: none; }

        /* Progress */
        .progress-wrap {
            margin: 16px 0;
        }
        .progress-bar-bg {
            height: 10px;
            background: var(--bg-primary);
            border-radius: 5px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--success), var(--accent));
            border-radius: 5px;
            transition: width 0.3s ease;
        }
        .case-list {
            max-height: 200px;
            overflow-y: auto;
        }
        .case-item {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .case-item:last-child { border-bottom: none; }
        .case-item .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .case-item.done .status-dot { background: var(--success); }
        .case-item.error .status-dot { background: var(--danger); }
        .case-item.claimed .status-dot { background: var(--warning); }
        .case-item.pending .status-dot { background: var(--text-muted); }
        .case-item .name { flex: 1; color: var(--text-primary); }
        .case-item .status { font-size: 12px; color: var(--text-secondary); }

        /* Chart container */
        .chart-container {
            position: relative;
            height: 220px;
            margin-top: 8px;
        }

        /* Screenshot gallery */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }
        .gallery img {
            width: 100%;
            aspect-ratio: 16/10;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: border-color 0.2s, transform 0.2s;
        }
        .gallery img:hover {
            border-color: var(--accent);
            transform: scale(1.02);
        }
        .gallery-empty {
            color: var(--text-muted);
            font-size: 14px;
            padding: 24px;
            text-align: center;
        }

        /* Report */
        .report-content {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 16px;
            max-height: 320px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-family: 'IBM Plex Mono', 'Consolas', monospace;
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
        }
        .report-empty { color: var(--text-muted); font-style: italic; }

        /* Last run summary (right column) */
        .last-run-card .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }
        .last-run-card .detail-row:last-child { border-bottom: none; }
        .last-run-card .detail-label { color: var(--text-secondary); }
        .last-run-card .detail-value { color: var(--text-primary); font-weight: 500; }
        .last-run-card .btn-link {
            margin-top: 12px;
            display: inline-block;
            color: var(--accent);
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
        }
        .last-run-card .btn-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="layout" id="layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">QA</div>
                <span class="title">AiQA</span>
                <button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
                </button>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                    <span>Dashboard</span>
                </a>
            </nav>
            <div class="sidebar-footer">&copy; AiQA</div>
        </aside>

        <main class="main">
            <header class="page-header">
                <h1>Test Dashboard</h1>
                <p>Run test plans, monitor progress, and view reports</p>
            </header>

            <div class="stats-grid">
                <div class="stat-card total">
                    <div class="stat-label">Total Cases</div>
                    <div class="stat-value" id="stat-total">0</div>
                </div>
                <div class="stat-card passed">
                    <div class="stat-label">Passed</div>
                    <div class="stat-value" id="stat-done">0</div>
                </div>
                <div class="stat-card error">
                    <div class="stat-label">Failed</div>
                    <div class="stat-value" id="stat-error">0</div>
                </div>
                <div class="stat-card pending">
                    <div class="stat-label">Pending</div>
                    <div class="stat-value" id="stat-pending">0</div>
                </div>
            </div>

            <div class="content-grid">
                <div class="content-left">
                    <div class="card run-controls">
                        <div class="card-header">Client & Test Plan</div>
                        <div class="card-body">
                            <div class="form-row">
                                <label>Client: <select id="client-select"></select></label>
                                <label>Plan: <input type="text" id="plan-path" value="shopify-standard.md" placeholder="shopify-standard.md"></label>
                                <label>Workers: <input type="number" id="num-workers" value="2" min="1" max="4"></label>
                            </div>
                            <div class="form-row btn-group">
                                <button class="btn btn-secondary" id="btn-upload">Upload Plan (MD/CSV)</button>
                                <input type="file" id="file-input" class="file-input-hidden" accept=".md,.markdown,.csv">
                                <button class="btn btn-primary" id="btn-run">Start Run</button>
                            </div>
                        </div>
                    </div>

                    <div class="card" id="run-card" style="display:none">
                        <div class="card-header">Run: <span id="run-id"></span></div>
                        <div class="card-body">
                            <div class="progress-wrap">
                                <div class="progress-bar-bg">
                                    <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
                                </div>
                            </div>
                            <div class="case-list" id="case-list"></div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header">Screenshots</div>
                        <div class="card-body">
                            <div class="gallery" id="screenshot-gallery" style="display:none"></div>
                            <div class="gallery-empty" id="gallery-empty">No screenshots yet.</div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header">Latest Report</div>
                        <div class="card-body">
                            <div class="report-content" id="report-content">No report yet.</div>
                        </div>
                    </div>
                </div>

                <div class="content-right">
                    <div class="card">
                        <div class="card-header">Test Status</div>
                        <div class="card-body">
                            <div class="chart-container">
                                <canvas id="statusChart"></canvas>
                            </div>
                        </div>
                    </div>
                    <div class="card last-run-card">
                        <div class="card-header">Last Run Summary</div>
                        <div class="card-body">
                            <div class="detail-row">
                                <span class="detail-label">Run ID</span>
                                <span class="detail-value" id="last-run-id">—</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Client</span>
                                <span class="detail-value" id="last-run-client">—</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Completed</span>
                                <span class="detail-value" id="last-run-completed">—</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API = '/api/aiqa';
        let pollInterval = null;
        let statusChart = null;

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('sidebar-collapsed');
            document.getElementById('layout').classList.toggle('collapsed');
        }

        function updateChart(done, err, pending) {
            const ctx = document.getElementById('statusChart');
            if (!ctx) return;
            if (statusChart) statusChart.destroy();
            const total = done + err + pending;
            const data = total ? [done, err, pending] : [1];
            const labels = total ? ['Passed', 'Failed', 'Pending'] : ['No data'];
            const colors = total ? ['#3fb950', '#f85149', '#d29922'] : ['#30363d'];
            statusChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels,
                    datasets: [{
                        data,
                        backgroundColor: colors,
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });
        }

        async function loadClients() {
            const r = await fetch(API + '/clients');
            const d = await r.json();
            const sel = document.getElementById('client-select');
            sel.innerHTML = d.clients.map(c => `<option value="${c}">${c}</option>`).join('');
        }

        document.getElementById('btn-upload').onclick = () => document.getElementById('file-input').click();
        document.getElementById('file-input').onchange = async (e) => {
            const f = e.target.files[0];
            if (!f) return;
            const form = new FormData();
            form.append('file', f);
            const r = await fetch(API + '/upload-plan', { method: 'POST', body: form });
            const d = await r.json();
            alert(`Uploaded: ${d.case_count} test case(s)`);
            document.getElementById('plan-path').value = f.name;
            e.target.value = '';
        };

        document.getElementById('btn-run').onclick = async () => {
            const client = document.getElementById('client-select').value;
            const plan = document.getElementById('plan-path').value.trim();
            const workers = parseInt(document.getElementById('num-workers').value) || 2;
            const r = await fetch(API + '/run', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ client_name: client, plan_path: plan, num_workers: workers }),
            });
            const d = await r.json();
            if (d.run_id) {
                document.getElementById('run-card').style.display = 'block';
                document.getElementById('run-id').textContent = d.run_id;
                startPolling(d.run_id);
            } else {
                alert('Failed to start run');
            }
        };

        function startPolling(runId) {
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(() => fetchRunStatus(runId), 2000);
            fetchRunStatus(runId);
        }

        async function fetchRunStatus(runId) {
            const r = await fetch(API + '/status/' + runId);
            if (!r.ok) return;
            const d = await r.json();
            const total = d.total || 1;
            const done = d.done || 0;
            const err = d.error || 0;
            const pending = d.pending || 0;

            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-pending').textContent = pending;
            document.getElementById('stat-done').textContent = done;
            document.getElementById('stat-error').textContent = err;
            document.getElementById('progress-bar').style.width = ((done + err) / total * 100) + '%';

            updateChart(done, err, pending);

            document.getElementById('last-run-id').textContent = runId;
            document.getElementById('last-run-client').textContent = d.client_name || '—';
            document.getElementById('last-run-completed').textContent = `${done + err} / ${total}`;

            const list = document.getElementById('case-list');
            if (d.cases) {
                list.innerHTML = d.cases.map(c => `
                    <div class="case-item ${c.status}">
                        <span class="status-dot"></span>
                        <span class="name">${c.case_id}: ${c.name}</span>
                        <span class="status">${c.status}</span>
                    </div>
                `).join('');
                loadScreenshots(d);
            }

            if (pending === 0 && (done + err) > 0) {
                clearInterval(pollInterval);
                pollInterval = null;
                loadReport();
            }
        }

        function loadScreenshots(statusData) {
            const gallery = document.getElementById('screenshot-gallery');
            const empty = document.getElementById('gallery-empty');
            const urls = [];
            (statusData.cases || []).forEach(c => {
                (c.screenshots || []).forEach(url => urls.push(url));
            });
            if (urls.length) {
                gallery.innerHTML = urls.map(url => `<img src="${url}" alt="screenshot" onclick="window.open(this.src)">`).join('');
                gallery.style.display = 'grid';
                empty.style.display = 'none';
            } else {
                gallery.innerHTML = '';
                gallery.style.display = 'none';
                empty.style.display = 'block';
            }
        }

        async function loadReport() {
            const client = document.getElementById('client-select').value;
            const r = await fetch(API + '/reports/latest?client_name=' + encodeURIComponent(client));
            const d = await r.json();
            const el = document.getElementById('report-content');
            el.textContent = d.content || 'No report yet.';
            el.classList.toggle('report-empty', !d.content);
        }

        loadClients();
        loadReport();
        updateChart(0, 0, 0);
    </script>
</body>
</html>
